    <script>
      document.getElementById("shutter").classList.remove("close");
      function shutterOpen() {
        document.getElementById("shutter").classList.add("open");
      }
      function shutterClose(url) {
        const shutter = document.getElementById("shutter");
        shutter.classList.remove("open");
        shutter.classList.add("close");
        setTimeout(function () {
          window.location = url;
        }, 400);
      }
      const shutterMaxWait = 1000;
      setTimeout(function () {
        shutterOpen();
      }, shutterMaxWait);
      window.onpageshow = function () {
        shutterOpen();
      };
      $(function () {
        $('a:not([href^="#"]):not([target]):not([href^="index.html#"])').on(
          "click",
          function (e) {
            e.preventDefault();
            url = $(this).attr("href");
            if (url !== "") {
              shutterClose(url);
            }
            return false;
          },
        );
      });
    </script>

                            <script>
                              window.UsaImageHelper = {
                                supportsWebp: false,
                                webpPromise: null,
                                detectWebp() {
                                  if (this.webpPromise) {
                                    return this.webpPromise;
                                  }

                                  this.webpPromise = new Promise((resolve) => {
                                    try {
                                      const image = new Image();

                                      image.onload = () => {
                                        this.supportsWebp =
                                          image.width > 0 && image.height > 0;
                                        resolve(this.supportsWebp);
                                      };

                                      image.onerror = () => {
                                        this.supportsWebp = false;
                                        resolve(false);
                                      };

                                      image.src =
                                        "data:image/webp;base64,UklGRiIAAABXRUJQVlA4IBYAAAAwAQCdASoBAAEADsD+JaQAA3AAAAAA";
                                    } catch (error) {
                                      this.supportsWebp = false;
                                      resolve(false);
                                    }
                                  });

                                  return this.webpPromise;
                                },
                                resolveImageSrc(
                                  image,
                                  supportsWebp = this.supportsWebp,
                                ) {
                                  if (!Array.isArray(image)) {
                                    return image;
                                  }

                                  const [imagePath, useWebp] = image;

                                  if (!useWebp || !supportsWebp) {
                                    return imagePath;
                                  }

                                  return imagePath.replace(/\.[^.]+$/, ".webp");
                                },
                              };
                              window.UsaScrollHelper = {
                                observer: null,
                                getObserver() {
                                  if (this.observer) {
                                    return this.observer;
                                  }

                                  this.observer = new IntersectionObserver(
                                    (entries) => {
                                      entries.forEach((entry) => {
                                        if (!entry.isIntersecting) {
                                          return;
                                        }

                                        entry.target.classList.add("is-active");
                                        entry.target.dataset.scrollObserved =
                                          "active";
                                        this.observer.unobserve(entry.target);
                                      });
                                    },
                                    {
                                      root: null,
                                      rootMargin: "0px 0px -10% 0px",
                                      threshold: 0,
                                    },
                                  );

                                  return this.observer;
                                },
                                observeTargets(root = document) {
                                  const scope =
                                    root instanceof Element ? root : document;
                                  const observer = this.getObserver();

                                  scope
                                    .querySelectorAll("[data-scroll]")
                                    .forEach((element) => {
                                      if (
                                        element.dataset.scrollObserved ===
                                        "active"
                                      ) {
                                        return;
                                      }

                                      element.dataset.scrollObserved =
                                        "pending";
                                      observer.observe(element);
                                    });
                                },
                              };
                              window.UsaCookieHelper = {
                                parseArrayValue(value) {
                                  if (Array.isArray(value)) {
                                    return value;
                                  }

                                  if (
                                    typeof value !== "string" ||
                                    value === ""
                                  ) {
                                    return [];
                                  }

                                  try {
                                    const decodedValue =
                                      decodeURIComponent(value);
                                    const parsedValue =
                                      JSON.parse(decodedValue);
                                    return Array.isArray(parsedValue)
                                      ? parsedValue
                                      : [];
                                  } catch (error) {
                                    try {
                                      const parsedValue = JSON.parse(value);
                                      return Array.isArray(parsedValue)
                                        ? parsedValue
                                        : [];
                                    } catch (parseError) {
                                      return [];
                                    }
                                  }
                                },
                                getRawCookie(key) {
                                  const cookiePrefix = `${key}=`;
                                  const cookieEntry = document.cookie
                                    .split(";")
                                    .map((cookie) => cookie.trim())
                                    .find((cookie) =>
                                      cookie.startsWith(cookiePrefix),
                                    );

                                  if (!cookieEntry) {
                                    return null;
                                  }

                                  return cookieEntry.slice(cookiePrefix.length);
                                },
                                getArrayCookie($cookies, key) {
                                  const value = $cookies.get(key);
                                  const parsedValue =
                                    this.parseArrayValue(value);

                                  if (parsedValue.length > 0) {
                                    return parsedValue;
                                  }

                                  return this.parseArrayValue(
                                    this.getRawCookie(key),
                                  );
                                },
                              };

                                props: [
                                  "dateCharacters",
                                  "dateTurn",
                                  "dateTurnLimit",
                                  "usedDateQuestionIds",
                                  "dateQuestionPools",
                                  "dateAnswerHistory",
                                  "clearedCharacterIds",
                                  "isTestDay",
                                ],
                                emits: ["next-page", "select-date-character"],
                                computed: {
                                  effectiveClearedCharacterIds() {
                                    const localClearIds = Array.isArray(
                                      this.clearedCharacterIds,
                                    )
                                      ? [...this.clearedCharacterIds]
                                      : [];
                                    const cookieClearIds =
                                      window.UsaCookieHelper.getArrayCookie(
                                        this.$cookies,
                                        "search_clears",
                                      );

                                    return [
                                      ...new Set([
                                        ...cookieClearIds,
                                        ...localClearIds,
                                      ]),
                                    ];
                                  },
                                  availableCharacters() {
                                    const clearIds =
                                      this.effectiveClearedCharacterIds;

                                    return this.dateCharacters
                                      .filter(
                                        (character) =>
                                          !this.isTestDay ||
                                          character.id !== "cocoa",
                                      )
                                      .map((character) => {
                                        const remainingCount =
                                          this.getRemainingCount(character.id);
                                        const totalPoint = this.getTotalPoint(
                                          character.id,
                                        );
                                        const isCleared = clearIds.includes(
                                          character.id,
                                        );

                                        return {
                                          ...character,
                                          remainingCount,
                                          totalPoint,
                                          isDisabled: this.isTestDay
                                            ? false
                                            : remainingCount === 0,
                                        };
                                      });
                                  },
                                  remainingTurns() {
                                    return this.dateTurnLimit - this.dateTurn;
                                  },
                                  currentTurnLabel() {
                                    return Math.min(
                                      this.dateTurn + 1,
                                      this.dateTurnLimit,
                                    );
                                  },
                                  pageClass() {
                                    return this.isTestDay
                                      ? "dateSelect -test"
                                      : "dateSelect";
                                  },
                                  dateInfoClass() {
                                    return this.isTestDay
                                      ? "dateInfo -h"
                                      : "dateInfo";
                                  },
                                  footerText() {
                                    if (this.isTestDay) {
                                      return "";
                                    }

                                    return "クリア条件：♡4以上<br>シークレット条件：<br>１．チノ、リゼ、千夜、シャロEND回収<br>２．ココアを選択済み<br>３．試験当日までに全キャラ♡3以上";
                                  },
                                  currentDateLabel() {
                                    return this.isTestDay
                                      ? "試験　当日"
                                      : `■Day ${this.currentTurnLabel}`;
                                  },
                                  isAllRouteUnlocked() {
                                    const clearTargetCharacterIds = [
                                      "cocoa",
                                      "chino",
                                      "rize",
                                      "chiya",
                                      "syaro",
                                    ];
                                    const pointTargetCharacterIds = [
                                      "chino",
                                      "rize",
                                      "chiya",
                                      "syaro",
                                    ];
                                    const clearIds =
                                      this.effectiveClearedCharacterIds;

                                    if (!clearTargetCharacterIds.length) {
                                      return false;
                                    }

                                    const allCharactersCleared =
                                      clearTargetCharacterIds.every(
                                        (characterId) =>
                                          clearIds.includes(characterId),
                                      );
                                    const allCharactersHaveBonus =
                                      pointTargetCharacterIds.every(
                                        (characterId) =>
                                          this.getTotalPoint(characterId) >= 3,
                                      );

                                    return (
                                      allCharactersCleared &&
                                      allCharactersHaveBonus
                                    );
                                  },
                                  secretButtonLabel() {
                                    return this.isAllRouteUnlocked
                                      ? "ALL"
                                      : "???";
                                  },
                                },
                                methods: {
                                  getRemainingCount(characterId) {
                                    const questionIds = (
                                      this.dateQuestionPools?.[characterId] ||
                                      []

                                    return questionIds.filter(
                                      (questionId) =>
                                        !this.usedDateQuestionIds.includes(
                                          questionId,
                                        ),
                                    ).length;
                                  },
                                  formatCharacterId(characterId) {
                                    if (!characterId) {
                                      return "";
                                    }

                                    return (
                                      characterId.charAt(0).toUpperCase() +
                                      characterId.slice(1)
                                    );
                                  },
                                  getTotalPoint(characterId) {
                                    return (this.dateAnswerHistory || [])
                                      .filter(
                                        (answer) =>
                                          answer.characterId === characterId,
                                      )
                                      .reduce(
                                        (total, answer) =>
                                          total + (answer.point || 0),
                                        0,
                                      );
                                  },

                                inheritAttrs: false,
                                props: [
                                  "selectedCharacter",
                                  "dateAnswerHistory",

                                          answer.characterId ===

                                        ...new Set([

                                    }
                                    if (pageType === "TitlePage") {
                                      this.resetScoreState();

                                    if (
                                      pageType === "DatePage" &&
                                      !options.preserveDateSession
                                    ) {
                                      this.resetDateSession();
                                    }
                                    if (
                                      pageType === "DatePage" &&
                                      options.incrementDateTurn
                                    ) {
                                      this.dateTurn = Math.min(
                                        this.dateTurn + 1,

                                    const bgmType =
                                      this.resolveBgmType(pageType);
                                    const newBgm = this.resolveBgmUrl(pageType);

                                    if (this.currentBgm !== newBgm) {
                                      this.playBgm(newBgm);
                                    }

                                    this.changeBodyClass(bgmType);
                                  },
                                  resolveBgmType(pageType) {
                                    switch (pageType) {
                                      //case 'TestPage':
                                      case "TestQuizPage":
                                      case "ChechQuizPage":
                                      case "TestQuizAllPage":
                                      case "ChechQuizAllPage":
                                      case "ExtraPage":
                                      case "digiconPage":
                                        return "m2";
                                      case "TestQuizAfterPage":
                                      case "TestQuizAllAfterPage":
                                        return "m3";
                                      default:
                                        return "m1";
                                    }
                                  },
                                  resolveBgmUrl(pageType) {
                                    const bgmMap = {
                                      m1: "core_sys/images/main/audio/m1.mp3",
                                      m2: "core_sys/images/main/audio/m2.mp3",
                                      m3: "core_sys/images/main/audio/m3.mp3",
                                      testAfter: {
                                        chino:
                                          "core_sys/images/main/audio/chino.mp3",
                                        rize: "core_sys/images/main/audio/rize.mp3",
                                        chiya:
                                          "core_sys/images/main/audio/chiya.mp3",
                                        syaro:
                                          "core_sys/images/main/audio/syaro.mp3",
                                      },
                                    };

                                    if (pageType === "TestQuizAfterPage") {
                                      return (
                                        bgmMap.testAfter[
                                          this.selectedCharacterId
                                        ] || bgmMap.m3
                                      );
                                    }

                                    return (
                                      bgmMap[this.resolveBgmType(pageType)] ||
                                      bgmMap.m1
                                    );
                                  },
                                  playBgm(bgmUrl) {
                                    // 既存のBGMを停止
                                    if (this.audioInstance) {
                                      this.audioInstance.pause();
                                      this.audioInstance = null;
                                    }

                                    // 新しいBGMをセット
                                    this.audioInstance = new Audio(bgmUrl);

                                    this.audioInstance.play();

                                    const clearTargetCharacterIds = [

                                      "rize",

                                    const pointTargetCharacterIds = [
                                      "chino",
                                      "rize",
                                      "chiya",
                                      "syaro",
                                    ];
                                    const clearIds =
                                      this.getEffectiveClearedCharacterIds();

                                    if (!clearTargetCharacterIds.length) {
                                      return false;
                                    }

                                    const allCharactersCleared =
                                      clearTargetCharacterIds.every(
                                        (characterId) =>
                                          clearIds.includes(characterId),
                                      );
                                    const allCharactersHaveBonus =
                                      pointTargetCharacterIds.every(
                                        (characterId) =>
                                          this.getCharacterTotalPoint(
                                            characterId,
                                          ) >= 3,
                                      );

                                    return (
                                      allCharactersCleared &&
                                      allCharactersHaveBonus
                                    );
                                  },

                                  },

                                    const questions =

                                      (question) =>
                                        !this.usedDateQuestionIds.includes(
                                          question.id,

                                      this.selectedCharacterId = characterId;
                                      this.activeDateQuestion = null;
                                      this.setCurrentPage("digiconPage");

                                      this.testSceneIndex = 0;
                                      this.setCurrentPage("TestQuizPage");

                                        characterId,

                                    if (!availableQuestions.length) {
                                      return;
                                    }

                                    const randomIndex = Math.floor(
                                      Math.random() * availableQuestions.length,

                                      availableQuestions[randomIndex];
                                    this.setCurrentPage("QuizPage");
                                  },
                                  resolveDateResult(
                                    answerHistory = this.dateAnswerHistory,
                                  ) {
                                    if (!answerHistory.length) {
                                      return this.resultData?.[0]?.id || 1;
                                    }

                                    const characterCounts = {};
                                    answerHistory.forEach((answer, index) => {
                                      if (
                                        !characterCounts[answer.characterId]
                                      ) {
                                        characterCounts[answer.characterId] = {
                                          count: 0,
                                          lastIndex: index,
                                        };
                                      }

                                      characterCounts[
                                        answer.characterId
                                      ].count += 1;
                                      characterCounts[
                                        answer.characterId
                                      ].lastIndex = index;
                                    });

                                    const selectedCharacterEntry =
                                      Object.entries(characterCounts).sort(
                                        (a, b) => {
                                          if (b[1].count !== a[1].count) {
                                            return b[1].count - a[1].count;
                                          }

                                          return (
                                            b[1].lastIndex - a[1].lastIndex
                                          );
                                        },
                                      )[0];

                                    if (!selectedCharacterEntry) {
                                      return this.resultData?.[0]?.id || 1;
                                    }

                                    const selectedCharacterId =
                                      selectedCharacterEntry[0];
                                    const targetCharacter =
                                      this.getDateCharacter(
                                        selectedCharacterId,

                                    const characterAnswers =
                                      answerHistory.filter(
                                        (answer) =>
                                          answer.characterId ===
                                          selectedCharacterId,
                                      );
                                    const secondChoiceCount =
                                      characterAnswers.filter(
                                        (answer) => answer.choiceIndex === 1,
                                      ).length;
                                    const latestCharacterAnswer =
                                      characterAnswers[
                                        characterAnswers.length - 1
                                      ];
                                    const resultChoiceIndex =
                                      secondChoiceCount ===
                                      characterAnswers.length / 2
                                        ? latestCharacterAnswer.choiceIndex
                                        : secondChoiceCount >
                                            characterAnswers.length / 2
                                          ? 1
                                          : 0;

                                    return (
                                      targetCharacter?.results?.[
                                        resultChoiceIndex
                                      ] ||
                                      this.resultData?.[0]?.id ||
                                      1

                                      this.activeDateQuestion.choices?.[
                                        choiceIndex
                                      ];
                                    const point =
                                      typeof selectedChoice === "object"
                                        ? selectedChoice.point || 0
                                        : 0;
                                    const nextDateAnswerHistory = [
                                      ...this.dateAnswerHistory,

                                        characterId: this.selectedCharacterId,
                                        questionId: this.activeDateQuestion.id,
                                        choiceIndex,
                                        point,

                                    this.dateAnswerHistory = [
                                      ...this.dateAnswerHistory,
                                      {
                                        characterId,
                                        questionId: `search_${characterId}_${this.dateAnswerHistory.length}`,
                                        choiceIndex: null,
                                        point: Number(point) || 0,
                                        source: "search",
                                      },
                                    ];
                                  },
                                  handleSearchClear(characterId) {
                                    if (
                                      !characterId ||
                                      this.clearedCharacterIds.includes(
                                        characterId,
                                      )
                                    ) {
                                      return;
                                    }

                                    this.clearedCharacterIds = [
                                      ...this.clearedCharacterIds,
                                      characterId,
                                    ];
                                  },
                                  handleQuizGuideShown() {
                                    this.hasShownQuizGuide = true;
                                  },
                                  onBeforeEnter(el) {
                                    window.scroll(0, 0);
                                  },
                                  preloadNextComponent(el) {
                                    this.isLoading = true;
                                    this.nextImagesLoaded = false;

                                    let imageList = false;
                                    if (
                                      el.__vueParentComponent?.type ===
                                      TitlePage
                                    ) {
                                      imageList = TitleImgs;
                                    }
                                    if (imageList) {
                                      this.preloadImages(
                                        Object.values(imageList),
                                      ).then(() => {
                                        this.nextImagesLoaded = true;
                                        this.checkLoadingStatus();
                                      });
                                    } else {
                                      this.nextImagesLoaded = true;
                                      this.checkLoadingStatus();
                                    }
                                  },
                                  preloadImages(imageArray) {
                                    return Promise.all(
                                      imageArray.map(
                                        (image) =>
                                          new Promise((resolve) => {
                                            const img = new Image();
                                            img.src = this.imageSrc(image);
                                            img.onload = () => resolve();
                                            img.onerror = () => resolve();
                                          }),
                                      ),
                                    );
                                  },
                                  checkLoadingStatus() {
                                    if (this.nextImagesLoaded) {
                                      this.isLoading = false;
                                    }
                                  },
                                },
                                computed: {
                                  selectedCharacter() {
                                    return this.getDateCharacter(
                                      this.selectedCharacterId,
                                    );
                                  },
                                  currentPageProps() {
                                    return {
                                      inheritAttrs: false,
                                      resultData: this.resultData,
                                      resultIndex: this.resultIndex,
                                      dateCharacters: this.dateCharacters,
                                      dateTurn: this.dateTurn,
                                      dateTurnLimit: this.dateTurnLimit,
                                      isTestDay:
                                        this.currentPage === "TestPage",
                                      selectedCharacter: this.selectedCharacter,
                                      activeDateQuestion:
                                        this.activeDateQuestion,
                                      usedDateQuestionIds:
                                        this.usedDateQuestionIds,
                                      dateAnswerHistory: this.dateAnswerHistory,
                                      hasShownQuizGuide: this.hasShownQuizGuide,
                                      testSceneIndex: this.testSceneIndex,
                                      clearedCharacterIds:
                                        this.clearedCharacterIds,
                                      dateQuestionPools: this.dateQuestionPools,
                                    };
                                  },
                                },
                                created() {
                                  this.clearedCharacterIds =
                                    window.UsaCookieHelper.getArrayCookie(
                                      this.$cookies,
                                      "search_clears",
                                    );
                                },
                                components: {
                                  FirstPage,
                                  TitlePage,
                                  Opening1Page,
                                  Opening2Page,
                                  DatePage,
                                  TestPage: DatePage,
                                  QuizPage,
                                  TestQuizPage,
                                  TestQuizAfterPage,
                                  ChechQuizPage,
                                  TestQuizAllPage,
                                  TestQuizAllAfterPage,
                                  ChechQuizAllPage,
                                  SearchPage,
                                  ExtraPage,
                                  digiconPage,
                                },
                              });

                              app.mixin({
                                data() {
                                  return {
                                    supportsWebp:
                                      window.UsaImageHelper.supportsWebp,
                                  };
                                },
                                mounted() {
                                  this.$nextTick(() => {
                                    window.UsaScrollHelper.observeTargets(
                                      document,
                                    );
                                  });
                                },
                                updated() {
                                  this.$nextTick(() => {
                                    window.UsaScrollHelper.observeTargets(
                                      document,
                                    );
                                  });
                                },
                                methods: {
                                  imageSrc(image) {
                                    return window.UsaImageHelper.resolveImageSrc(
                                      image,
                                      this.supportsWebp,
                                    );
                                  },
                                },
                              });

                              window.UsaImageHelper.detectWebp().finally(() => {
                                app.use($cookies).mount("#ap2026");
                              });
                            </script>
                          </div>
                        </div>
                      </div>
                    </div>
                    <!-- ＜main＞end -->
                  </div>
                </div>
                <!-- ＜contents_main＞end -->
              </div>
            </div>
            <!-- ＜contents＞end -->

            <!-- ＜ext_area_02＞start -->
            <!-- ＜ext_area_02＞end -->

            <!-- ＜footer＞start -->
            <!-- ＜footer＞end -->
          </div>
        </div>
        <!-- ＜container＞end -->
      </div>
    </div>
